version: '3.8'

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: nexis-v2:latest
    container_name: nexis_web
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      # Add your actual production ENV variables here or to a .env in same dir
      - DATABASE_URL=${DATABASE_URL:-}
      - NEXTAUTH_URL=${NEXTAUTH_URL:-http://localhost:3000}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET:-some-strong-secret}
    # If using Turso/external DB, you don't need a local DB service here.
    # If using local SQLite file, you'd need to map a volume to persist it.
