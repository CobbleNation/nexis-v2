version: '3.8'

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: nexis-v2:latest
    container_name: nexis_web
    restart: unless-stopped
    # We no longer expose port 3000 directly to the host, Caddy will route traffic to it
    expose:
      - "3000"
    environment:
      # Add your actual production ENV variables here or to a .env in same dir
      - DATABASE_URL=${DATABASE_URL:-}
      - NEXTAUTH_URL=${NEXTAUTH_URL:-https://zynorvia.com}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET:-some-strong-secret}
    volumes:
      - nexis_uploads:/app/public/uploads

  caddy:
    image: caddy:2-alpine
    container_name: caddy_proxy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - web

volumes:
  caddy_data:
  caddy_config:
  nexis_uploads:
