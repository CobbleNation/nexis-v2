name: Deploy Next.js to VPS

on:
  push:
    branches:
      - main
  workflow_dispatch: # Allows manual trigger from GitHub UI

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: cobblenation/nexis-v2

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy-to-vps:
    needs: build-and-push
    runs-on: ubuntu-latest
    
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          debug: true
          script: |
            set -e
            # Check if docker is installed
            if ! [ -x "$(command -v docker)" ]; then
              echo "Docker is not installed. Installing..."
              curl -fsSL https://get.docker.com -o get-docker.sh
              sh get-docker.sh
              rm get-docker.sh
            fi

            # Check if docker-compose is available (v2)
            if ! docker compose version > /dev/null 2>&1; then
              echo "Docker Compose v2 is missing. Installing plugin..."
              apt-get update && apt-get install -y docker-compose-plugin
            fi
            
            # Create project directory if it doesn't exist
            mkdir -p /opt/nexis
            cd /opt/nexis
            
            # Login to GHCR to be able to pull the image
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            
            # Create/Update docker-compose.yml on the server
            cat > docker-compose.yml << EOF
            services:
              web:
                image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
                container_name: nexis_web
                restart: unless-stopped
                ports:
                  - "3000:3000"
                extra_hosts:
                  - "host.docker.internal:host-gateway"
                env_file:
                  - .env
            EOF
            
            # Full cleanup and restart to ensure new code is live
            docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
            
            # If the file exists, bring it down. If not, ignore error.
            if [ -f "docker-compose.yml" ]; then
              docker compose down --remove-orphans
            fi
            
            docker compose up -d --force-recreate
            
            # Run database migrations
            echo "Running database migrations..."
            docker exec nexis_web npx drizzle-kit push || echo "Migration skipped or failed (check if drizzle-kit is in production image)"
            
            # Clean up old unused images to save disk space
            docker image prune -a -f --filter "until=24h"
